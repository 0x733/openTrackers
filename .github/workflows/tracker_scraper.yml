name: Tracker Scraper

on:
  schedule:
    - cron: '0 21 * * *'  # Her gün UTC 21:00 (Türkiye saati 00:00)
  workflow_dispatch:
  push:
    paths:
      - 'scraper.py'
      - '.github/workflows/tracker_scraper.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
    
    - name: Run scraper
      run: |
        python scraper.py
      continue-on-error: true
    
    - name: Check for changes
      id: check_changes
      run: |
        git status
        echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT
    
    - name: Configure Git
      if: steps.check_changes.outputs.changes > 0
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes > 0
      run: |
        git add tracker_data.json
        git commit -m "🤖 Tracker verisi güncellendi: $(date +'%Y-%m-%d %H:%M:%S')"
        git push

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
