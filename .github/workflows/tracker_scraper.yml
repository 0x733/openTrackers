name: Tracker Scraper
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scraper.py'
      - '.github/workflows/tracker_scraper.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Paketleri Kur
      run: |
        pip install -U pip
        pip install requests beautifulsoup4
    
    - name: Scraper Çalıştır
      run: python scraper.py
      continue-on-error: true
    
    - name: Git Durumunu Kontrol Et
      id: degisiklik
      run: |
        git add -A
        git status
        echo "durum=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT
    
    - name: Git Ayarla
      if: steps.degisiklik.outputs.durum > 0
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
    
    - name: Değişiklikleri Kaydet
      if: steps.degisiklik.outputs.durum > 0
      run: |
        git add tracker_data.json
        timestamp=$(date '+%Y-%m-%d %H:%M:%S')
        git commit -m "🤖 Veri güncellendi: $timestamp"
        git push origin HEAD:${GITHUB_REF}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}